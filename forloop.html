<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fro loop practice</title>
</head>
<body>
    <h1>
        for loop practice
    </h1>
    <script>
        for(let i = 0; i<=10;i++){
            console.log("hello",i);
        }

        for(let j = 0;j<=10;j+=2){
            console.log("print:",j);
        }

        for(let m = 10;m>=0;m--){
            console.log("print return:",m);
        }

        for(let c=1;c<=10;c++){
            console.log(`10 * ${c} = `,10*c);
        }

        for(let q = 1;q<=10;q++){
            for(let u = 0;u<=5;u++){
                console.log("hello",u);
            }
            console.log(`this is main loop `);
        }
</script>
    
</body>
</html>
