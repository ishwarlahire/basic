<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for_in_loop</title>
</head>
<body>
    <script>
        let user = {
            name:"radha-krishn",
            mail:"radha.krishn@gmail.com",
            age:20,
            phone:1212121212,
            admin:true
        }
        for(let key in user){
            console.log(key +" is "+ user[key]);
        }

        for (let key in user){
            if (key == "mail"){
                continue;
            }

        if(key =="phone" ){
            break;
        }
        console.log(key +" is "+ user[key]);
        }
    </script>
    
</body>
</html>
